name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install bats-core shellcheck

      - name: Install bats and shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats shellcheck

      - name: Lint
        run: make lint

      - name: Test
        run: make test
